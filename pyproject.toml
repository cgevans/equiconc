[build-system]
requires = ["maturin>=1.0,<2"]
build-backend = "maturin"

[project]
name = "equiconc"
version = "0.1.0"
requires-python = ">=3.9"

[tool.maturin]
features = ["python"]

[dependency-groups]
dev = [
    "ipykernel>=6.31.0",
    "ipywidgets>=8.1.8",
    "matplotlib>=3.9",
    "numpy>=2.0",
]
