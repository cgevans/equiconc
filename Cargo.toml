[package]
name = "equiconc"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
nalgebra = "0.34"
pyo3 = { version = "0.28", optional = true, features = ["extension-module", "abi3-py310"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []
python = ["pyo3"]

[[bench]]
name = "equilibrium"
harness = false
