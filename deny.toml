# cargo-deny configuration.
#
# Scope: license enforcement on the runtime dependency tree of the
# published crate (and, when the `python` / `coffee-cli` features are
# enabled, the runtime trees of those too). Dev-dependencies — criterion,
# proptest, the COFFEE git dep used for cross-checks — are excluded:
# they ship with neither the crates.io tarball nor the PyPI wheel, so
# their licenses don't constrain downstream users.
#
# The `equiconc-web` workspace member (`publish = false`) is also
# excluded — its Leptos / Trunk dependency tree is part of the static
# website artifact, not anything redistributed via crates.io. Licenses
# in that tree are reviewed via the `web` CI job's bundle-build step,
# not here.

[graph]
# Skip dev-dependencies. Avoids needing to allow Apache-2.0 (nalgebra,
# criterion bits), BSL-1.0 (ryu via criterion), Zlib/Unlicense quirks,
# and the no-license-metadata coffee git dep.
exclude-dev = true
# Resolve with all optional features so PyO3 and clap (coffee-cli) are
# included in the check.
all-features = true

[licenses]
# Allow-list. Anything not listed fails the check. SPDX expressions are
# evaluated as a whole, so a crate licensed "MIT OR Apache-2.0" passes
# if either is allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",  # target-lexicon (build-dep of pyo3)
    "BSD-3-Clause",                     # equiconc itself
    "Unicode-3.0",                      # unicode-ident (transitively via syn)
]
confidence-threshold = 0.93

# Per-crate license exceptions. Each entry is a permissive license that
# we accept for one specific crate that ships only inside the
# `equiconc-web` static-website artifact (see top-of-file scope note).
# These crates do not ship in the published crates.io tarball or PyPI
# wheel, so the license obligations apply only to the website bundle.
exceptions = [
    # Leptos / Trunk dep tree (web only):
    { allow = ["CC0-1.0"], crate = "base16" },
    { allow = ["Zlib"], crate = "const_format" },
    { allow = ["Zlib"], crate = "const_format_proc_macros" },
    { allow = ["Zlib"], crate = "konst" },
    { allow = ["Zlib"], crate = "konst_macro_rules" },
    { allow = ["Zlib"], crate = "slotmap" },
    { allow = ["BSL-1.0"], crate = "xxhash-rust" },
]

[advisories]
# Fail on any RustSec advisory affecting the runtime tree
# (vulnerabilities, unmaintained crates, unsound code, yanked versions).
# Add an entry to `ignore` with a comment if a specific advisory is known
# to not affect equiconc or is awaiting an upstream fix.
version = 2
ignore = [
    # `paste` is unmaintained but only pulled in transitively as a
    # proc-macro build-dep of `pulp` (the SIMD dispatch crate enabled by
    # the `simd` feature). It runs at compile time, generates code in
    # pulp, and never executes at runtime — equiconc's runtime safety is
    # not affected by paste's maintenance status. Re-evaluate when pulp
    # migrates off paste (it's tracked upstream).
    "RUSTSEC-2024-0436",
    # `bincode 1.3.3` is unmaintained (the team ceased development after
    # an out-of-band incident; the advisory describes the situation
    # rather than a vulnerability). Pulled in transitively as
    # gloo-worker → bincode for the worker postMessage codec, used only
    # in the `equiconc-web` static-website artifact, not in the
    # published `equiconc` crate. Re-evaluate when gloo-worker upgrades
    # to bincode 2.x (tracked upstream).
    "RUSTSEC-2025-0141",
]

[sources]
# Refuse runtime crates that come from anywhere other than the default
# crates.io registry. The `cgevans/coffee` git dep is dev-only and is
# excluded by `[graph] exclude-dev = true`, so no git source allowlist
# is needed here.
unknown-registry = "deny"
unknown-git = "deny"
